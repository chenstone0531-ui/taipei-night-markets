body{font-family:"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink)}

.head{background:linear-gradient(135deg,#ff5e8a,#ff9248,#ffb84d);color:#fff;padding:24px 20px 20px;border-radius:0 0 24px 24px}

.head p{font-size:13px;opacity:.95;margin-top:5px}
.list{padding:14px 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:14px;overflow:hidden;cursor:pointer;transition:.2s}
.chead{display:flex;align-items:center;gap:12px;padding:16px}
.badge{flex:0 0 auto;width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:28px}
.ctitle{flex:1;min-width:0}
.ctitle .n{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctitle .loc{font-size:12px;color:var(--muted);margin-top:3px}
.ctitle .star{font-size:12px;color:var(--gold);margin-top:4px}
.chev{color:var(--muted);font-size:20px;transition:.3s}
.card.open .chev{transform:rotate(90deg)}
.card.jensen{border:2px solid var(--gold);background:linear-gradient(160deg,rgba(255,215,106,.14),var(--card))}
.card.jensen .badge{background:linear-gradient(135deg,#ffd76a,#76b900)}
.card.jensen .n::after{content:"NVIDIA";font-size:10px;background:#76b900;color:#fff;padding:2px 7px;border-radius:8px;letter-spacing:1px}
.body{display:none;padding:0 16px 16px;animation:fade .35s}
.card.open .body{display:block}
@keyframes fade{from{opacity:0}to{opacity:1}}
.feat{font-size:14px;color:var(--ink);line-height:1.7;background:rgba(255,184,77,.1);border-left:3px solid var(--brand2);padding:10px 12px;border-radius:0 10px 10px 0;margin-bottom:12px}
.sec{font-size:13px;color:var(--gold);letter-spacing:2px;margin:12px 0 8px;font-weight:600;display:flex;justify-content:space-between}
.sec .cnt{color:var(--muted);font-weight:400}
.stalls{display:flex;flex-direction:column;gap:8px}
.stall{background:rgba(255,255,255,.04);border-radius:12px;overflow:hidden}
.srow{display:flex;align-items:center;gap:10px;padding:9px 11px;cursor:pointer}
.sthumb{flex:0 0 auto;width:46px;height:46px;border-radius:10px;object-fit:cover;background:#322848}
.si{flex:1;min-width:0}
.sn{font-size:14px;font-weight:600}
.sd{font-size:12px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scam{color:var(--brand2);font-size:16px}
.sdetail{display:none;padding:0 11px 11px}
.stall.open .sdetail{display:block;animation:fade .3s}
.bigphoto{width:100%;height:160px;object-fit:cover;border-radius:10px;background:#322848}
.smap{margin-top:8px;height:150px;border-radius:10px;overflow:hidden;background:#000}
.smap iframe{width:100%;height:100%;border:0;display:block}
.snav{display:block;text-align:center;margin-top:8px;padding:9px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;text-decoration:none;font-size:13px;font-weight:600}
.sback{width:100%;margin-bottom:8px;padding:9px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.06);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer}
.sback:active{transform:scale(.98)}
.nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;text-decoration:none;font-size:15px;font-weight:600}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:10px;line-height:1.6}
</style>

const mapSrc=q=>"https://www.google.com/maps?q="+encodeURIComponent(q)+"&z=17&output=embed";
const navUrl=q=>"https://www.google.com/maps/dir/?api=1&destination="+encodeURIComponent(q);
const photo=(seed)=>"https://loremflickr.com/240/240/taiwan,food,streetfood?lock="+seed;
const star=s=>"★".repeat(Math.round(s))+"☆".repeat(5-Math.round(s))+"  "+s;
let pid=0;
document.getElementById('list').innerHTML=markets.map((m,i)=>`
 <div class="card${m.jensen?' jensen':''}" id="c${i}">
   <div class="chead" onclick="toggle(${i})">
     <div class="badge">${m.e}</div>
     <div class="ctitle"><div class="n">${m.n}</div>
       <div class="loc">📍 ${m.loc}</div>
       <div class="star">${star(m.star)}</div></div>
     <div class="chev">›</div>
   </div>
   <div class="body">
     <div class="feat">${m.feat}</div>
     <div class="sec"><span>🔥 必吃攤位</span><span class="cnt">共 ${m.stalls.length} 攤・點圖看照片</span></div>
     <div class="stalls">${m.stalls.map((s,j)=>{const id=pid++;return `
       <div class="stall" id="s${id}">
         <div class="srow" onclick="stoggle(${id},'${(m.n.replace(/'/g,'')+' '+s[0]).replace(/"/g,'')}',${i})">
           <img class="sthumb" loading="lazy" src="${photo(id+11)}" alt="">
           <div class="si"><div class="sn">${s[0]}</div><div class="sd">${s[2]}</div></div>
           <span class="scam">📷</span>
         </div>
         <div class="sdetail" data-q="${m.jensen?(s[0]+' 台北 夜市美食'):(s[0]+' '+m.loc.replace(/\([^)]*\)/g,'').trim())}"></div>
       </div>`;}).join('')}</div>
     <a class="nav" href="${navUrl(m.n+' '+m.loc)}" target="_blank">➤ 整個夜市・地圖導航</a>
   </div>
 </div>`).join('');

function toggle(i){const c=document.getElementById('c'+i);const was=c.classList.contains('open');
 document.querySelectorAll('.card').forEach(x=>x.classList.remove('open'));
 if(!was){c.classList.add('open');setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'start'}),120);}}

function stoggle(id,q,mi){const el=document.getElementById('s'+id);const was=el.classList.contains('open');
 if(was){el.classList.remove('open');return;}
 const dt=el.querySelector('.sdetail');const fullq=dt.getAttribute('data-q');
 if(!el.dataset.loaded){
   dt.innerHTML=`<button class="sback" onclick="event.stopPropagation();stoggle(${id})">← 返回攤位列表</button>
     <img class="bigphoto" loading="lazy" src="${photo(id+501)}" alt="">
     <div class="smap"><iframe loading="lazy" src="${mapSrc(fullq)}"></iframe></div>
     <a class="snav" href="${navUrl(fullq)}" target="_blank">➤ 導航到這攤（大概位置）</a>`;
   el.dataset.loaded="1";}
 el.classList.add('open');}
</script>
